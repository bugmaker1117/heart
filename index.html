<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    /* 粒子背景 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 100, 120, 0.4);
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(110vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* 爱心 */
    .heart-wrapper {
      position: relative;
      cursor: pointer;
      filter: drop-shadow(0 0 40px rgba(255, 80, 100, 0.8));
    }

    .heart {
      width: 200px;
      height: 200px;
      position: relative;
      animation: heartbeat 1.2s ease-in-out infinite;
      transform-origin: center;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 160px;
      background: linear-gradient(135deg, #ff6b9d, #ff3366, #ff0055);
      border-radius: 100px 100px 0 0;
    }

    .heart::before {
      left: 100px;
      top: 0;
      transform-origin: 0 100%;
      transform: rotate(-45deg);
    }

    .heart::after {
      left: 0;
      top: 0;
      transform-origin: 100% 100%;
      transform: rotate(45deg);
    }

    /* 内层光晕 */
    .heart-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%);
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: glow-pulse 1.2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      14% {
        transform: scale(1.15);
      }
      28% {
        transform: scale(1);
      }
      42% {
        transform: scale(1.1);
      }
      70% {
        transform: scale(1);
      }
    }

    @keyframes glow-pulse {
      0%, 100% {
        opacity: 0.5;
        transform: translate(-50%, -40%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -40%) scale(1.2);
      }
    }

    /* 点击爆炸效果 */
    .heart-wrapper:active .heart {
      animation: explode 0.3s ease-out;
    }

    @keyframes explode {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* 文字 */
    .love-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 0.2em;
      background: linear-gradient(90deg, #ff6b9d, #ff3366, #ff9cc0, #ff3366, #ff6b9d);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      text-shadow: none;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* 副标题 */
    .subtitle {
      color: rgba(255, 150, 180, 0.6);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fade-in-out 3s ease-in-out infinite;
    }

    @keyframes fade-in-out {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* 飞出的小爱心 */
    .mini-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .mini-heart {
      position: absolute;
      font-size: 20px;
      animation: fly-heart 2s ease-out forwards;
      opacity: 0;
    }

    @keyframes fly-heart {
      0% {
        transform: translateY(0) scale(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-200px) scale(1.5) rotate(30deg);
        opacity: 0;
      }
    }

    /* 外圈光环 */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(255, 100, 150, 0.3);
      animation: ring-expand 2s ease-out infinite;
    }

    .ring:nth-child(1) { width: 250px; height: 250px; animation-delay: 0s; }
    .ring:nth-child(2) { width: 300px; height: 300px; animation-delay: 0.5s; }
    .ring:nth-child(3) { width: 350px; height: 350px; animation-delay: 1s; }

    @keyframes ring-expand {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0.6;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.4);
        opacity: 0;
      }
    }

    /* 点击提示 */
    .click-hint {
      color: rgba(255, 180, 200, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      margin-top: -20px;
    }
  </style>
</head>
<body>

  <!-- 粒子背景 -->
  <div class="particles" id="particles"></div>

  <!-- 飞出的爱心 -->
  <div class="mini-hearts" id="miniHearts"></div>

  <!-- 光环 -->
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>

  <!-- 主内容 -->
  <div class="container">
    <div class="heart-wrapper" id="heartWrapper" onclick="spawnHearts(event)">
      <div class="heart"></div>
      <div class="heart-glow"></div>
    </div>

    <div class="love-text">LOVE</div>
    <div class="subtitle">click the heart ✨</div>
    <div class="click-hint">点击爱心试试看</div>
  </div>

  <script>
    // 生成粒子背景
    const particles = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = (Math.random() * 8 + 3) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.background = `rgba(${220 + Math.random()*35}, ${50 + Math.random()*80}, ${100 + Math.random()*60}, 0.5)`;
      particles.appendChild(p);
    }

    // 点击爱心飞出小爱心
    function spawnHearts(e) {
      const container = document.getElementById('miniHearts');
      const emojis = ['❤️', '💕', '💗', '💓', '💖', '💝', '🩷'];

      for (let i = 0; i < 10; i++) {
        const heart = document.createElement('div');
        heart.className = 'mini-heart';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = (e.clientX + (Math.random() - 0.5) * 100) + 'px';
        heart.style.top = e.clientY + 'px';
        heart.style.fontSize = (15 + Math.random() * 20) + 'px';
        heart.style.animationDuration = (1 + Math.random()) + 's';
        heart.style.animationDelay = (Math.random() * 0.3) + 's';
        heart.style.transform = `rotate(${(Math.random() - 0.5) * 60}deg)`;

        const xDrift = (Math.random() - 0.5) * 150;
        heart.style.setProperty('--x', xDrift + 'px');
        heart.style.animation = `fly-heart ${1 + Math.random()}s ease-out ${Math.random() * 0.3}s forwards`;

        container.appendChild(heart);
        setTimeout(() => heart.remove(), 2500);
      }
    }
  </script>
</body>
</html>
